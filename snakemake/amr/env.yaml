__use_yte__: true
__variables__:
  rng: 49274
test: False
log_wandb: True

slurm_time_limit: "15-0:0:0"

huggingface: "../data/remote/cache/huggingface"
evo2_runscript: "../scripts/evo2_sbatch.sh"
data:
  raw: "../data/raw"
  meta: "../data/meta"
  processed: "../data/processed"
  temp: "../data/temp"
  tests: "../tests/data"
bin: "../bin"
out:
  root: "../results/output"
  tests: "../results/tests"
src: "../src"
remote: "../data/remote"
cache: "../data/temp/cache"

rng: ?int(rng)

memray:
  run: False
  kws:
  flamegraph:
    run: True
    kws:
  table:
    run: True
    kws:

tasks:
  # [2025-12-26 Fri] Details on selection in `data_curation.org` and `preprocessing.org`
  classification:
    [
      "gentamicin_class",
      "tetracycline_class",
      "trimethoprim-sulfamethoxazole_class",
      "ciprofloxacin_class",
      "cefoxitin_class",
    ]
  regression:
    [
      "gentamicin",
      "tetracycline",
      "trimethoprim-sulfamethoxazole",
      "ciprofloxacin",
      "cefoxitin",
    ]

# * Unnamed constants
# In processed sequence datasets
# - 'sequence' contains the sequences
#   for esm, use 'sequence_aa'
# - 'sample' for sample names (also in pooled datasets)
# - 'seqid' unique sequences for each sample
# - 'uid' concatenation of sample name, sequence name, start, stop. Used to uniquely
#     identify subsequences from each sample
# * Embedding comparison

# NOTE: in the output, you use `-1` to denote metrics for which p-values should not be
# calculated to distinguish from `NaN` of theoretically valid p-values

# Quantify embedding clusterings
compare_embeddings:
  bootstrap_rounds: 3 # bootstrap with subsampling to make computations faster and also so that there aren't too many
  n_samples_per: 4 # number of samples randomly chosen in bootstrap rounds
  # [2025-10-01 Wed] Would add more, but 20 samples led to 34,000 sequences
  methods:
    - neighbor_proportion
    - pair_distance_distribution
    - clustering
  pair_distance_distribution:
    cols: ["sample"]
    distance_metric: cosine
    kws:
      n_pairs_per: 20
  neighbor_proportion:
    cols: ["sample"]
    kws:
      metric: "cosine"
      n_neighbors: 5
  cluster_on:
    - "sample" # do the sequence embeddings recover their original genomes when clustered?
    - "bakta_gene" # do sequence embeddings cluster by genes?
    - "hamr_drug_class"

compare_pooled:
  bootstrap_rounds: 1
  n_samples_per: null # At the genome level, not many samples so we can afford to do this
  methods:
    - neighbor_proportion
    - covariate_distance_correlation
    - pair_distance_distribution
    - clustering
  pair_distance_distribution:
    cols: [""]
    distance_metric: cosine
    kws:
      n_pairs_per: 20
  covariate_distance_correlation:
    cols: ["species"] # TODO: come up with columns for this. The columns need to
    # contain continuous data e.g. AST scores
    distance_metric: "cosine"
  neighbor_proportion:
    cols: ["species"] # TODO: come up with columns for this
    kws:
      metric: "cosine"
      n_neighbors: 7
      null_bootstrap_rounds: 1000
      include_null: true
      include_impurity: true
  cluster_on:
    - "amikacin_class" # TODO: maybe can cluster by species, or categorical cutoffs for amr
  continuous:
    - "AMK" # Continuous variables to display in plots

# * Data preprocessing

save_tokens: false
# Very memory intensive
token_prop: 0.3

# fasta_remap: "../data/meta/genome2biosample.csv"
# [2025-12-29 Mon] Unused now that you set it up in batches

# ** Metadata
ast_metadata: # Used in `evaluate.smk`
  file: "../data/meta/ncbi_all_samples.tsv"
  id_col: "BioSample"
  smooth: true
  binarize: true
sample_metadata: # Used in `prepare_data.smk`
  file: "../data/meta/ast_subsampled.tsv"
  id_col: "BioSample"
seq_metadata:
  renaming_rules:
    id_col: "sample"
    seqid_col: "seqid"
    start_col: "start"
    stop_col: "stop"
  hamronization: "" # hamronization summary tsv
  combgc: "" # combgc directory
  bakta: "" # bakta directory
  ampcombi: "" # Ampcombi summary cluster tsv

genomes: "" # Genome directory, relative to REMOTE

# * Preprocessing methods

embedding_methods:
  seqLens:
    batch_size: 64
    pooling: "mean"
  Evo2:
    batch_size: 10
    retries: 5
    # [2025-11-20 Thu] TODO: run here was 10, but try 100 later
  # [2025-11-04 Tue] Input for evo2 is around 1500-2000 base pairs, recommended to include upstream context for each chunk
  esm:
    model: "esmc_600m"
    pooling: "mean"
    batch_size: 64
    hidden_layer: null # Use "embeddings" key
    # hidden_layer: -1 # Use last hidden layer

embedding: "Evo2"

embedding_method2max_length:
  seqLens: 512 # from documentation
  Evo2: 1800 # from personal communication with maintainer
  esm: ?2048 * 3 # context length * 3 for codons

pool_embeddings: #
  methods: # For benchmarking purposes, try them all first
    # `methods` is a map of POOLING_NAME -> kws
    # In case POOLING_NAME isn't directly the name of a pooling method, specify which
    # method exactly with the `method` key
    mean:
    sum:
    similarity:
    # swe:
    random:
      rng: ?int(rng)
    amr_mechanisms:
      method: seq_subset
      priority:
        [
          "antibiotic inactivation",
          "antibiotic target alteration",
          "antibiotic efflux",
        ]
      subset_col: hamr_resistance_mechanism
      agg: null
      split: ";"
    # amr_genes:
    #   method: seq_subset
    #   priority: TODO if amr_mechanisms does well, then it'll be worth finding stuff
    #   for this. Otherwise, don't bother
  obs_keep: []
  embedding_key: "embedding"
  key: "x"
  sample_key: "sample"

preprocessing: # NOTE: must prefix baseline pooling methods with "baseline-"
  baseline-kmer10:
    method: kmer
    k: 7
  baseline-feature_presence_bakta:
    source: "bakta"
    method: feature_presence
  baseline-feature_presence_hamr:
    source: "hamr"
    method: feature_presence
    # id_regexp: "([^.]*)"
  bin:
    split_method: bin
  orf_only:
    split_method: bakta
  orf_w_downstream:
    split_method: bakta
    utr_amount: [0, 200]
  orf_w_upstream:
    split_method: bakta
    utr_amount: [200, 0]
  orf_w_both:
    split_method: bakta
    utr_amount: [200, 200]

# ** Feature filtering
# [2025-12-08 Mon] Filtering parameters for the baseline non-embedding datasets
baseline_filtering:
  method: "variance"
  quantile_threshold: 0.7

# * Evaluation

trainer:
  max_epochs: 20
  log_every_n_steps: 3
  enable_progress_bar: false
dataloader:
  batch_size: 5

cross_validate:
  models:
    - baseline
    # - TODO: add in a base mlp here
  validation_kws:
    test_size: 0.2
  k_fold:
    n_repeats: 2
    n_splits: 5
  control_tasks: # Mappings of target tasks to random control tasks
    gentamicin_class: genus # Example

# ** Holdout

holdout:
  splits:
  # TODO: define informative splits here e.g. to test generalization ability
  # generalize_rare:
  #   species_representation:
  #     minority: EXACT
  #     intermediate: EXACT
  bootstrap_splits: # Any non-deterministic split methods that should be run
    # multiple times
    small_train:
      repeat: 5
      # exclude:# remove samples with the following categorical features from dataset.
      # Has the same format as the `splits` key above,
      # i.e. it uses utils.train_test_from_dict
      # species:
      kws:
        train_size: 0.2

  models:
    - baseline
  validation_kws:
    test_size: 0.2 # Define the size of the validation set

# * Interpretation
train_sae:
  expansion_factor: 5 # Multiply model feature size by this amount to get
  # sae dictionary size
  trainer:
    max_epochs: 200
    log_every_n_steps: 3
    enable_progress_bar: false
  splits:
    test_size: 0.1
  dataloader:
    batch_size: 20
  model: "BatchTopK" # [2025-12-12 Fri] currently only BatchTopK
  sequence-level:
    run: true
    n: 500
    n_sequence: 100
    trainer:
    dataloader:
  genome-level:
    run: true
    n: 5000
    pooling:
  token-level:
    run: false
    n: 500
    n_sequence: 100
reconstruct_datasets:
  genome-level:
    n: 1000
  sequence-level:
    n: 1000 # Number of samples to reconstruct. Leave null to reconstruct everything
    n_sequence: 100 # Number of sequences per sample to save, at the sequence-level
    # Leave null to save all sequences per sample (not recommended)
save_activations:
  genome-level:
    n: 1000
  sequence-level:
    n: 1000
    n_sequence: 100
eval_sae:
  levels: ["sequence-level", "genome-level", "token-level"]
  activation_density:
    topk: 9
    kws:
      ncol: 3
      log_x: true
      bins: 15
  umap:
    n_neighbors: 15
  concept_cols:
    sequence-level:
      [
        "hamr_resistance_mechanism",
        "in_gene",
        "genus",
        "family",
        "isolation_source_broad",
        "any_resistant",
        "any_susceptible",
      ]
    genome-level:
      [
        "genus",
        "family",
        "isolation_source_broad",
        "any_resistant",
        "any_susceptible",
      ]
    # We expect to see consistency between "genus" and "family" firing patterns
    # i.e. if a latent fires on Salmonella, it should fire for the Enterobacteriaceae family

# * Plotting parameters
# TODO: should you save as png or svg?
report_plots:
  default:
    height: 10
    width: 15
    dpi: 500
  embedding_comparison:
    height: 12
    width: 15
    dpi: 500
  sae_activations:
    height: 13
    dpi: 500
    width: 15
  count_tables:
    palette: ["blue", "green"]
  rich-cli:
    theme: "emacs"
    panel: "ascii"
  sae_latent_fractions:
  sae_concept_scores:
  sae_umap: # this uses different params to plotnine
    dpi: 500

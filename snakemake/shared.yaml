test: False
huggingface: "../data/remote/cache/huggingface"
data:
  raw: "../data/raw"
  meta: "../data/meta"
  processed: "../data/processed"
  temp: "../data/temp"
  tests: "../tests/data"
bin: "../bin"
out:
  root: "../results/output"
  tests: "../results/tests"
src: "../src"
remote: "../data/remote"
cache: "../data/temp/cache"

# * Embedding comparison

# Quantify embedding clusterings
cluster_on:
  - "sample" # do the sequence embeddings recover their original genomes when clustered?
  - "gene" # do sequence embeddings cluster by genes?
  - "drug_class"

# * Data preprocessing

sample_metadata:
  file: "" # TODO: add in combined metadata file from ncbi's ast browser and
  # bvbrc. Mainly want the mapping between samples and ast scorse
  id_col: ""
seq_metadata:
  hamronization: "" #
  combgc: ""
  ampcombi: ""

bakta: "" # Output of bakta tool
genomes: "genomes" # Genome directory, relative to REMOTE

embedding:
  method: "seqLens"
  pooling: "mean"

preprocessing:
  bin:
    split_method: bin
  orf_only:
    split_method: bakta
    include_utrs: [False, False]
  orf_w_downstream:
    split_method: bakta
    include_utrs: [False, True]
  orf_w_upstream:
    split_method: bakta
    include_utrs: [True, False]
  orf_w_both:
    split_method: bakta
    include_utrs: [True, True]

__use_yte__: true
__definitions__:
  - from pathlib import Path
  - import sys
  - args = sys.argv
  - home = str(Path.home())
  - test = ("test=True" in args) or ("test=true" in args)
  - remote = "../../data/remote"
  - outdir = f"{remote}/2026-04-11_seq_analysis" if not test else f"{remote}/tests/seq_analysis"
__variables__:
  seed: 429472
# NOTE: Using 'x' as the embedding key and 'id' as the sample id

log_wandb: true
wandb_project: amr_predict-seqs
test: ?test

huggingface: ?f"{remote}/cache/huggingface"
slurm_time_limit: "18-00:00:00"
# NOTE: limit for gpu40g is hard-capped at 8 hrs
outdir: ?outdir
rng: ?int(seed)

write_training_indices:
  test_size: 0.4
  shuffle: true

train_sae:
  trainer:
    max_epochs: 200
    log_every_n_steps: 3
    enable_progress_bar: false
  dataloader:
    batch_size: 128

co_occurence_min_support: 0.3

label_clustering:
  min_height: 0.7
  method: average # One of single, complete, average, weighted
  metric: jaccard

metadata:
  file: ?f"{remote}/datasets/2026-04-21_uniprot_swissprot_goa.tsv"
  sample_col: "Entry"
  label_col: "Gene Ontology IDs"
  label_sep: ";"

sequence_variants:
  random:
    permuted:
      method: permutation
      kws:
        rng: ?this["rng"]
    denovo:
      method: denovo
      kws:
        rng: ?this["rng"]
        with_distribution: true
  perturbed:
    lg_substitution:
      method: substitution_matrix
      seqtype: aa
      kws:
        matrix: LG
        k: 5
        replacement_rate: 0.6
    codon_optimization_human:
      method: codon_optimization
      seqtype: nuc
      kws:
        species: h_sapiens

resources:
  gpu40:
    mem: 64g
    qos: gpu40g
    gres: "gpu:7g.40gb:1"
    slurm_partition: gpu

# TODO: set up interplm
# TODO: but you can also train with their pipeline. Might be easier and you can make
# use of their metrics. Only thing you'll need to do is configure the esm embedding function in SeqEmbedder to get the embedder from interplm.embedders, and call embed_single_sequence or embed batch

# NOTE: can't use interplm because it's trained on token-level embeddings, unlike what
# you will pass to it
saes: # Mapping of
  pretrained:

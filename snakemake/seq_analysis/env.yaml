__use_yte__: true
__variables__:
  remote: ../../data/remote
  seed: 429472

log_wandb: true

huggingface: ?f"{remote}/cache/huggingface"
slurm_time_limit: "18-0:0:0"
outdir: ?f"{remote}/2026-04-11_seq_analysis"
rng: ?int(seed)

write_training_indices:
  test_size: 0.4
  random_state: ?int(seed)
  shuffle: true

train_sae:
  trainer:
    max_epochs: 200
    log_every_n_steps: 3
    enable_progress_bar: false
  dataloader:

# NOTE: Using 'x' as the embedding key

co_occurence_min_support: 0.3

label_clustering:
  min_height: 0.7
  method: average # One of single, complete, average, weighted
  metric: jaccard

metadata:
  file: ?f"{remote}/datasets/2026-04-21_uniprot_swissprot_goa.tsv"
  sample_col: "Entry"
  label_col: "Gene Ontology IDs"
  label_sep: ";"

resources:
  gpu40:
    mem: 64g
    qos: gpu40g
    gres: "gpu:7g.40gb:1"
    slurm_partition: gpu

# TODO: set up interplm
# TODO: but you can also train with their pipeline. Might be easier and you can make
# use of their metrics. Only thing you'll need to do is configure the esm embedding function in SeqEmbedder to get the embedder from interplm.embedders, and call embed_single_sequence or embed batch

# NOTE: can't use interplm because it's trained on token-level embeddings, unlike what
# you will pass to it
saes: # Mapping of
  interplm_1:
    source: interplm
    token_level: true
    kws:
      plm_model: "esm2_t6_8"
    embedding: esm2
  batchtopk_50: # If the value is None, it's assumed to have been trained already and it
    source: custom
    kws:
      dict_size: ?1152 * 8
      top_k: 50 # [2026-04-20 Mon] could determine optimal with hparam sweep

  # should be the name of an sae in the `to_train` mapping

  # esmc official has embeddings of shape 1152
  # MODEL_DIMS = {
  #        "facebook/esm2_t6_8M_UR50D": 320,
  #        "facebook/esm2_t12_35M_UR50D": 480,
  #        "facebook/esm2_t30_150M_UR50D": 640,
  #        "facebook/esm2_t33_650M_UR50D": 1280,
  #        "facebook/esm2_t36_3B_UR50D": 2560,
  #        "facebook/esm2_t48_15B_UR50D": 5120,
  #    }

embedding_max_lengths:
  esm: 2048
  seqLens: 512

embedding_methods:
  aa:
    esmc_mean:
      method: esm
      kws:
        model: esmc_600m
        pooling: mean
    esmc_cls:
      method: esm
      kws:
        model: esmc_600m
        pooling: cls
    esmc_max:
      method: esm
      kws:
        model: esmc_600m
        pooling: max
  nuc:
    seqlens:

# TODO: add directory containing metadata for the fasta files

fastas: #
  aa:
    - file: ?f"{remote}/datasets/2026-04-10_GOA/aa.fasta"
      header_style: uniprot
    - file: ?f"{remote}/datasets/2026-04-10_uniprot_swissprot/annotation_level_4.fasta"
      header_style: uniprot
    - file: ?f"{remote}/datasets/2026-04-10_uniprot_swissprot/annotation_level_5.fasta"
      header_style: uniprot

  # nuc:

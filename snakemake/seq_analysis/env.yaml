    #   source: interplm
    #   level: "tokens"
    #   kws:
    #     plm_model: "esm2_t6_8"
    #   embedding: esm2
  custom:
    batchtopk_50:
      kws:
        dict_size: ?1152 * 8
        top_k: 50 # [2026-04-20 Mon] could determine optimal with hparam sweep

  # should be the name of an sae in the `to_train` mapping

  # esmc official has embeddings of shape 1152
  # MODEL_DIMS = {
  #        "facebook/esm2_t6_8M_UR50D": 320,
  #        "facebook/esm2_t12_35M_UR50D": 480,
  #        "facebook/esm2_t30_150M_UR50D": 640,
  #        "facebook/esm2_t33_650M_UR50D": 1280,
  #        "facebook/esm2_t36_3B_UR50D": 2560,
  #        "facebook/esm2_t48_15B_UR50D": 5120,
  #    }

eval_sae:
  threshold: 0.8 # TODO: should decide this from data
  top_k: 20 # TODO: can add more, but keep it like this for now

dummy_embeddings:
  n: 10000 # Number of samples to take from metadata
  splits: [0.5, 0.25, 0.25] # Training splits
  sizes: [512, 1080]
  nonlinearity: "tanh"
  noise_scale: 0.03

embedding_methods:
  aa:
    esmc:
      model: esmc_600m
      poolings:
        max:
        mean:
        sum:
      kws:
        token_amount: 10

    # esmc_mean:
    #   method: esm
    #   level: seqs
    #   kws:
    #     model: esmc_600m
    #     pooling: mean
    # esmc_cls:
    #   method: esm
    #   level: seqs
    #   kws:
    #     model: esmc_600m
    #     pooling: cls
    # esmc_max:
    #   method: esm
    #   level: seqs
    #   kws:
    #     model: esmc_600m
    #     pooling: max
  # nuc:
  # seqlens:
  # TODO: add omnina

# TODO: add directory containing metadata for the fasta files

fastas: #
  aa:
    - file: ?f"{remote}/datasets/2026-04-10_GOA/2026-06-02_aa_subsampled.fasta"
      header_style: uniprot
    - file: ?f"{remote}/datasets/2026-04-10_uniprot_swissprot/2026-06-02_annotation_level_4_subsampled.fasta"
      header_style: uniprot
    - file: ?f"{remote}/datasets/2026-04-10_uniprot_swissprot/2026-06-02_annotation_level_5_subsampled.fasta"
      header_style: uniprot

  # nuc:
# TODO: get these done, identify some category and annotation cols to use
neighbor_metrics:
  anno_sep: ";"
  category_cols: []
  anno_cols: ["Gene Ontology IDs", "InterPro"]
  subsample: ?0.01 if test else 0.2
  n_neighbors: 8
  n_resample: 10_000

embedding_correlations:
  columns:
    "Gene Ontology IDs": functional_similarity
    InterPro: functional_similarity
    sequence: sequence_similarity
    "Organism (ID)": taxonomic_similarity
  embedding_distance: euclidean
  sequence_distance: "kmer"
  n_resample: ?1000 if test else 10_000
  anno_sep: ";"
  tree_file: "../../data/meta/nodes.dmp" # Binding
  # `data` directory with singularity

find_baseline:
  n_repeats: ?3 if test else 5
  split_kws:
  classifiers:
    RandomForest:
    Lasso:
    SVM:
      kernel: "rbf"

perturbation_metrics:
  id_col: id
  embedding_distance: euclidean
  classifier_name: RandomForest
  cv: ?3 if test else 5
  n_distance_resampling: ?3 if test else 5
  rns_kws:
    n_neighbors: ?5 if test else 10

probing:
  classifiers:
    RandomForest: {}
    Lasso: {}
    SVM:
      kernel: "rbf"
  permutation_tests:
    use_cv: true
    r: 10
    k: 100
  tasks: # Try limit to three tasks
    dummy: "Organism (ID)"
    # GO: GO # TODO: haven't named this yet

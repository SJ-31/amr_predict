__use_yte__: true
__variables__:
  remote: ../../data/remote

log_wandb: true

huggingface: ?f"{remote}/cache/huggingface"
slurm_time_limit: "18-0:0:0"
outdir: ?f"{remote}/2026-04-11_seq_analysis"

resources:
  gpu40:
    mem: 64g
    qos: gpu40g
    gres: "gpu:7g.40gb:1"
    slurm_partition: gpu

# TODO: you need to write a unified interface to set up the pretrained models
saes: # Mapping of
  # See https://huggingface.co/liambai/InterProt-ESM2-SAEs for InterProt
  # interprot_1:
  #   source: interprot
  #   kws:
  #     repo_id: liambai/InterProt-ESM2-SAEs
  #     filename: esm2_plm1280_l24_sae4096.safetensors
  #   embedding: esm
  # See https://github.com/ElanaPearl/InterPLM/blob/main/interplm/sae/inference.py for how to set InterPLM up
  interplm_1:
    source: interplm
    kws:
      plm_model: "esm2-8m"
    embedding: esm2
  my_sae: # If the value is None, it's assumed to have been trained already and it
    source: custom
  # should be the name of an sae in the `to_train` mapping

embedding_max_lengths:
  esm: 2048
  seqLens: 512

embedding_methods:
  aa:
    esmc_mean:
      method: esm
      kws:
        model: esmc_600m
        pooling: mean
    esmc_cls:
      method: esm
      kws:
        model: esmc_600m
        pooling: cls
    esmc_max:
      method: esm
      kws:
        model: esmc_600m
        pooling: max
  nuc:
    seqlens:

# TODO: add directory containing metadata for the fasta files

fastas: #
  aa:
    - file: ?f"{remote}/datasets/2026-04-10_GOA/aa.fasta"
      header_style: uniprot
    - file: ?f"{remote}/datasets/2026-04-10_uniprot_swissprot/annotation_level_4.fasta"
      header_style: uniprot
    - file: ?f"{remote}/datasets/2026-04-10_uniprot_swissprot/annotation_level_5.fasta"
      header_style: uniprot

  # nuc:

__definitions__:
  - from pathlib import Path
  - tables = list(Path(input['count_dir']).iterdir())
  - |
    def make_name(stem):
        return stem.capitalize().replace("_", ": ", 1).replace("_", " ")

datasets:
  ?for table in tables:
    ?table.stem:
      path: ?str(table)

views:
  ?for table in tables:
    ?f"{make_name(table.stem)}":
      dataset: ?table.stem
      desc: ""
      render-table:
        columns:
          Proportion:
            plot:
              ticks:
                domain:
                  - 0
                  - 1
                color:
                  scale: linear
                  range:
                    - blue
                    - green
          Count:
            plot:
              heatmap:
                color-scheme: greens
                scale: linear

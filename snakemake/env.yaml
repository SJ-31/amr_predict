test: False
huggingface: "../data/remote/cache/huggingface"
data:
  raw: "../data/raw"
  meta: "../data/meta"
  processed: "../data/processed"
  temp: "../data/temp"
  tests: "../tests/data"
bin: "../bin"
out:
  root: "../results/output"
  tests: "../results/tests"
src: "../src"
remote: "../data/remote"
cache: "../data/temp/cache"

rng: 49274

# * Embedding comparison

# Quantify embedding clusterings
compare_embeddings:
  bootstrap_rounds: 3 # bootstrap with subsampling to make computations faster and also so that there aren't too many
  n_samples_per: 4 # number of samples randomly chosen in bootstrap rounds
  # [2025-10-01 Wed] Would add more, but 20 samples led to 34,000 sequences
  cluster_on:
    - "sample" # do the sequence embeddings recover their original genomes when clustered?
    - "bakta_gene" # do sequence embeddings cluster by genes?
    - "hamr_drug_class"

# * Data preprocessing

sample_metadata:
  file: "" # TODO: add in combined metadata file from ncbi's ast browser and
  # bvbrc. Mainly want the mapping between samples and ast scorse
  id_col: "Accession"
seq_metadata:
  renaming_rules:
    id_col: "sample"
    seqid_col: "seqid"
    start_col: "start"
    stop_col: "stop"
  hamronization: "../data/remote/output/jia_funcscan_2025-09-22/reports/hamronization_summarize/hamronization_combined_report.tsv" # hamronization summary tsv
  combgc: "../data/remote/output/jia_funcscan_2025-09-22/reports/combgc" # combgc directory
  bakta: "../data/remote/output/jia_funcscan_2025-09-22/annotation/bakta/all" # bakta directory
  ampcombi: "../data/remote/output/jia_funcscan_2025-09-22/reports/ampcombi2/Ampcombi_summary_cluster.tsv" # Ampcombi summary cluster tsv

genomes: "../data/remote/genomes" # Genome directory, relative to REMOTE

# * Preprocessing methods

embedding:
  method: "seqLens"

pooling:
  method: "mean"

preprocessing:
  bin:
    split_method: bin
  orf_only:
    split_method: bakta
    include_utrs: [False, False]
  orf_w_downstream:
    split_method: bakta
    include_utrs: [False, True]
  orf_w_upstream:
    split_method: bakta
    include_utrs: [True, False]
  orf_w_both:
    split_method: bakta
    include_utrs: [True, True]

test: False
huggingface: "../data/remote/cache/huggingface"
data:
  raw: "../data/raw"
  meta: "../data/meta"
  processed: "../data/processed"
  temp: "../data/temp"
  tests: "../tests/data"
bin: "../bin"
out:
  root: "../results/output"
  tests: "../results/tests"
src: "../src"
remote: "../data/remote"
cache: "../data/temp/cache"

rng: 49274

tasks:
  classification: []
  regression: []

# * Embedding comparison

# Quantify embedding clusterings
compare_embeddings:
  bootstrap_rounds: 3 # bootstrap with subsampling to make computations faster and also so that there aren't too many
  n_samples_per: 4 # number of samples randomly chosen in bootstrap rounds
  # [2025-10-01 Wed] Would add more, but 20 samples led to 34,000 sequences
  methods:
    - neighbor_proportion
    - pair_distance_distribution
    # - clustering
  pair_distance_distribution:
    cols: ["sample"]
    distance_metric: cosine
    kws:
      n_pairs_per: 20
  neighbor_proportion:
    cols: ["sample"]
    kws:
      metric: "cosine"
      n_neighbors: 5
  cluster_on:
    - "sample" # do the sequence embeddings recover their original genomes when clustered?
    - "bakta_gene" # do sequence embeddings cluster by genes?
    - "hamr_drug_class"

compare_pooled:
  bootstrap_rounds: 1
  n_samples_per: null # At the genome level, not many samples so we can afford to do this
  methods:
    - neighbor_proportion
    - covariate_distance_correlation
    - pair_distance_distribution
    # - clustering
  pair_distance_distribution:
    cols: [""]
    distance_metric: cosine
    kws:
      n_pairs_per: 20
  covariate_distance_correlation:
    cols: ["species"] # TODO: come up with columns for this. The columns need to
    # contain continuous data e.g. AST scores
    distance_metric: "cosine"
  neighbor_proportion:
    cols: ["species"] # TODO: come up with columns for this
    kws:
      metric: "cosine"
      n_neighbors: 5
  cluster_on:
    - "AMK_class" # TODO: maybe can cluster by species, or categorical cutoffs for amr
  continuous:
    - "AMK" # Continuous variables to display in plots

# * Data preprocessing

sample_metadata:
  file: "" # TODO: add in combined metadata file from ncbi's ast browser and
  # bvbrc. Mainly want the mapping between samples and ast scorse
  id_col: "Accession"
seq_metadata:
  renaming_rules:
    id_col: "sample"
    seqid_col: "seqid"
    start_col: "start"
    stop_col: "stop"
  hamronization: "../data/remote/output/jia_funcscan_2025-09-22/reports/hamronization_summarize/hamronization_combined_report.tsv" # hamronization summary tsv
  combgc: "../data/remote/output/jia_funcscan_2025-09-22/reports/combgc" # combgc directory
  bakta: "../data/remote/output/jia_funcscan_2025-09-22/annotation/bakta/all" # bakta directory
  ampcombi: "../data/remote/output/jia_funcscan_2025-09-22/reports/ampcombi2/Ampcombi_summary_cluster.tsv" # Ampcombi summary cluster tsv

genomes: "../data/remote/genomes" # Genome directory, relative to REMOTE

# * Preprocessing methods

embedding:
  method: "seqLens"
  pooling: "mean" # seqLens needs a method to pool hidden states

pool_embeddings:
  methods: ["mean", "sum", "similarity"] # For benchmarking purposes, try them all first
  # methods: ["mean"]
  obs_keep:
  embedding_key: "embedding"
  key: "x"
  sample_key: "sample"
  discretize:
    cols: [""] # Continuous resistance variables to discretize
    suffix: "class"
    susceptible: 0.3 # lower than this quantile is susceptible
    resistant: 0.8 # greater than this is resistant

preprocessing:
  bin:
    split_method: bin
  orf_only:
    split_method: bakta
    include_utrs: [False, False]
  orf_w_downstream:
    split_method: bakta
    include_utrs: [False, True]
  orf_w_upstream:
    split_method: bakta
    include_utrs: [True, False]
  orf_w_both:
    split_method: bakta
    include_utrs: [True, True]

# * Evaluation

cross_validate:
  models:
    - baseline
    # - TODO: add in a base mlp here
  validation_kws:
    test_size: 0.2
  k_fold:
    n_repeats: 2
    n_splits: 5
holdout:
  splits: # TODO: define informative splits here e.g. to test generalization ability
    e_coli_train:
      species:
        e_coli: NOT

  models:
    - baseline
  validation_kws:
    test_size: 0.2

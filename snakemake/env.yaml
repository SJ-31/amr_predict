    - baseline
    # - TODO: add in a base mlp here
  validation_kws:
    test_size: 0.2
  k_fold:
    n_repeats: 2
    n_splits: 5
holdout:
  splits:
  # TODO: define informative splits here e.g. to test generalization ability
  # e_coli_train:
  #   species:
  #     e_coli: NOT

  models:
    - baseline
  validation_kws:
    test_size: 0.2


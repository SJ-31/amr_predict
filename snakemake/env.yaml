# * Embedding comparison

# NOTE: in the output, you use `-1` to denote metrics for which p-values should not be
# calculated to distinguish from `NaN` of theoretically valid p-values

# Quantify embedding clusterings
compare_embeddings:
  bootstrap_rounds: 3 # bootstrap with subsampling to make computations faster and also so that there aren't too many
  n_samples_per: 4 # number of samples randomly chosen in bootstrap rounds
  # [2025-10-01 Wed] Would add more, but 20 samples led to 34,000 sequences
  methods:
    - neighbor_proportion
    - pair_distance_distribution
    # - clustering
  pair_distance_distribution:
    cols: ["sample"]
    distance_metric: cosine
    kws:
      n_pairs_per: 20
  neighbor_proportion:
    cols: ["sample"]
    kws:
      metric: "cosine"
      n_neighbors: 5
  cluster_on:
    - "sample" # do the sequence embeddings recover their original genomes when clustered?
    - "bakta_gene" # do sequence embeddings cluster by genes?
    - "hamr_drug_class"

compare_pooled:
  bootstrap_rounds: 1
  n_samples_per: null # At the genome level, not many samples so we can afford to do this
  methods:
    - neighbor_proportion
    - covariate_distance_correlation
    - pair_distance_distribution
    # - clustering
  pair_distance_distribution:
    cols: [""]
    distance_metric: cosine
    kws:
      n_pairs_per: 20
  covariate_distance_correlation:
    cols: ["species"] # TODO: come up with columns for this. The columns need to
    # contain continuous data e.g. AST scores
    distance_metric: "cosine"
  neighbor_proportion:
    cols: ["species"] # TODO: come up with columns for this
    kws:
      metric: "cosine"
      n_neighbors: 7
      null_bootstrap_rounds: 1000
      include_null: true
      include_impurity: true
  cluster_on:
    - "AMK_class" # TODO: maybe can cluster by species, or categorical cutoffs for amr
  continuous:
    - "AMK" # Continuous variables to display in plots

# * Data preprocessing

sample_metadata:
  file: "" # TODO: add in combined metadata file from ncbi's ast browser and
  # bvbrc. Mainly want the mapping between samples and ast scorse
  id_col: ""
seq_metadata:
  renaming_rules:
    id_col: "sample"
    seqid_col: "seqid"
    start_col: "start"
    stop_col: "stop"
  hamronization: "" # hamronization summary tsv
  combgc: "" # combgc directory
  bakta: "" # bakta directory
  ampcombi: "" # Ampcombi summary cluster tsv

genomes: "" # Genome directory, relative to REMOTE

# * Preprocessing methods

embedding:
  method: "seqLens"
  pooling: "mean" # seqLens needs a method to pool hidden states

# embedding:
#   method: "Evo2"
# [2025-11-04 Tue] Input size is around 1500-2000 base pairs, recommended to include upstream
# context for each chunk

pool_embeddings:
  methods: # For benchmarking purposes, try them all first
    - method: mean
    - method: sum
    - method: similarity
    - method: swe
    # - method: mean
    #   name: "args_only"
    #   whitelist_col: # TODO: choose whether to use bakta gene or gene
    #   feature_whitelist: # TODO: find an a-priori list of informative args

  # methods: ["mean"]
  obs_keep: []
  embedding_key: "embedding"
  key: "x"
  sample_key: "sample"
  discretize:
    cols: [] # Continuous resistance variables to discretize
    suffix: "class"
    susceptible: 0.3 # lower than this quantile is susceptible
    resistant: 0.8 # greater than this is resistant

preprocessing:
  kmer10:
    method: kmer
    k: 10
  feature_presence_bakta:
    method: feature_presence
    feature_cols: ["Gene", "Product"]
  bin:
    split_method: bin
  orf_only:
    split_method: bakta
  orf_w_downstream:
    split_method: bakta
    utr_amount: [0, 200]
  orf_w_upstream:
    split_method: bakta
    utr_amount: [200, 0]
  orf_w_both:
    split_method: bakta
    utr_amount: [200, 200]

# * Evaluation


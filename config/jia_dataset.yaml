# configfile overrides for the Jia dataset
genomes: "../data/remote/genomes/jia"

pool_embeddings:
  methods:
    - method: mean
    - method: sum
    - method: similarity
  # [2025-10-27 Mon] swe caused bus error
  key: "x"

tasks:
  classification: ["GEN_class", "MIN_class"]
  regression: ["MIN", "GEN"]

sample_metadata:
  file: "../data/meta/jia_samples_reformatted.tsv"
  id_col: "Accession"
seq_metadata:
  hamronization: "../data/remote/output/jia_funcscan_2025-09-22/reports/hamronization_summarize/hamronization_combined_report.tsv" # hamronization summary tsv
  combgc: "../data/remote/output/jia_funcscan_2025-09-22/reports/combgc" # combgc directory
  bakta: "../data/remote/output/jia_funcscan_2025-09-22/annotation/bakta/all" # bakta directory
  ampcombi: "../data/remote/output/jia_funcscan_2025-09-22/reports/ampcombi2/Ampcombi_summary_cluster.tsv" # Ampcombi summary cluster tsv

compare_embeddings:
  bootstrap_rounds: 2 # bootstrap with subsampling to make computations faster and also so that there aren't too many
  n_samples_per: 10 # number of samples randomly chosen in bootstrap rounds
  # [2025-10-01 Wed] Would add more, but 20 samples led to 34,000 sequences
  pair_distance_distribution:
    cols: ["sample", "hamr_gene_symbol"]
    distance_metric: cosine
    kws:
      n_pairs_per: 20
      replace: True
  covariate_distance_correlation:
    cols: []
    distance_metric: cosine
    seq_start_col: "start"
    seq_end_col: "stop"
    seq_id_col: "seqid"
  neighbor_proportion:
    cols: ["sample", "hamr_gene_symbol", "bakta_product"]
    kws:
      metric: "cosine"
      n_neighbors: 5
  cluster_on:
    - "sample"
    - "hamr_gene_symbol"
    - "bakta_product"
    - "hamr_drug_class"

compare_pooled: # [2025-10-30 Thu] will choose to compare classes with the most even distribution, top two are MIN and GEN
  bootstrap_rounds: 1
  n_samples_per: null
  methods:
    - neighbor_proportion
    - covariate_distance_correlation
    - pair_distance_distribution
    - clustering
  pair_distance_distribution:
    cols: ["MIN_class", "GEN_class"]
    distance_metric: cosine
    kws:
      n_pairs_per: 20
  covariate_distance_correlation:
    cols: ["TGC", "CAZ"]
    distance_metric: "cosine"
  neighbor_proportion:
    cols: ["MIN_class", "GEN_class"]
    kws:
      metric: "cosine"
      n_neighbors: 5
  cluster_on:
    - "MIN_class"
    - "GEN_class"
  continuous:
    - "AMK"

cross_validate:
  models:
    - baseline
    # - TODO: add in a base mlp here
  validation_kws:
    test_size: 0.2
  k_fold:
    n_repeats: 2
    n_splits: 5

# TODO: for Evo2 config, set utr_amount [200, 200]

holdout:
  splits: null # [2025-10-31 Fri] nothing good to split on with just the jia dataset

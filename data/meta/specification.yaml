discretize_suffix: "class"
sample_col: "sample"

metadata:
  jia:
    path: "jia_samples_reformatted.tsv"
    sample_col: "Accession"
    discretize:
      cols: ["AMK", "GEN", "IPM", "MEM", "CRO", "CAZ", "FEP", "TGC", "MIN"]
      susceptible: 0.3,
      resistant: 0.8,
    to_drop:
      ["Strain", "ST Oxf", "ST Pas", "K/O typing", "City", "Collection date"]
  moradigaravand:
    path: "moradigaravand_samples.tsv"
    sample_col: "ENA.Accession.Number"
    to_drop: ["Isolate", "Lane.accession", "Sequecning Status", "Year"]
    add_class_suffix:
      [
        "CTZ",
        "CTX",
        "AMP",
        "AMX",
        "AMC",
        "TZP",
        "CXM",
        "CET",
        "GEN",
        "TBM",
        "TMP",
        "CIP",
      ]
